    function onTurnstileError()   { window.__xiyuTurnstileToken = null; }

  </script>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    lucide.createIcons({ attrs: { 'stroke-width': 1.8 } });

    const API = ''; // same-origin via nginx proxy

    // ─── Tab switching ─────────────────────────────────────────────────────
    const tabLogin = document.getElementById('tab-login');
    const tabReg   = document.getElementById('tab-register');
    const formLogin = document.getElementById('form-login');
    const formReg   = document.getElementById('form-register');

    function activate(tab) {
      if (tab === 'login') {
        tabLogin.classList.add('tab-active');     tabLogin.classList.remove('text-mute');
        tabReg.classList.remove('tab-active');    tabReg.classList.add('text-mute');
        formLogin.classList.remove('hidden');     formReg.classList.add('hidden');
      } else {
        tabReg.classList.add('tab-active');       tabReg.classList.remove('text-mute');
        tabLogin.classList.remove('tab-active');  tabLogin.classList.add('text-mute');
        formReg.classList.remove('hidden');       formLogin.classList.add('hidden');
      }
    }
    tabLogin.addEventListener('click', () => activate('login'));
    tabReg.addEventListener('click',   () => activate('register'));

    // URL ?tab=register
    if (new URLSearchParams(location.search).get('tab') === 'register') activate('register');

    // ─── Utilities ─────────────────────────────────────────────────────────
    function showMsg(elId, text, kind) {
      const el = document.getElementById(elId);
      el.textContent = (window.XiyuI18n && window.XiyuI18n.t) ? window.XiyuI18n.t(text, text) : text;
      el.className = 'text-[13px] font-medium px-3 py-2 rounded-xl ' +
        (kind === 'error' ? 'bg-red-50 text-danger' :
         kind === 'success' ? 'bg-emerald-50 text-emerald-600' :
         'bg-sakura-soft text-sakura-deep');
    }
    // v1.9.3: 永远不抛。fetch 网络错（断网/CSP/CORS）会被吞成 { ok:false, status:0, data:{message:...} }
    // 修真实 bug：之前 fetch reject → 调用方 await 抛错 → click handler 没 try/catch → 按钮永远卡在"发送中..."
    async function apiPost(path, body) {
      try {
        const r = await fetch(API + path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));
        return { ok: r.ok, status: r.status, data };
      } catch (err) {
        return { ok: false, status: 0, data: { message: '网络异常，请检查网络后重试' }, networkError: true };
      }
    }
    function setLoading(btn, loading, originalText) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<i data-lucide="loader-2" class="inline w-4 h-4 spinner align-[-2px]"></i> 处理中...'
        : originalText;
      lucide.createIcons({ attrs: { 'stroke-width': 1.8 } });
    }

    // ─── 发送验证码 ─────────────────────────────────────────────────────────
    const btnSendCode = document.getElementById('btn-send-code');
    let cooldownTimer = null;
    btnSendCode.addEventListener('click', async () => {
      const email = formReg.email.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        return showMsg('msg-register', '请先填写正确的邮箱地址', 'error');
      }

      // v1.10.0: Turnstile 前置拦截，避免无脑请求消耗邮件配额
      const tsToken = window.__xiyuTurnstileToken;
      if (!tsToken) {
        const hint = document.getElementById('turnstile-hint');
        if (hint) hint.classList.remove('hidden');
        return showMsg('msg-register', '请先完成下方人机验证', 'error');
      }

      btnSendCode.disabled = true;
      btnSendCode.textContent = '发送中...';

      const { ok, data } = await apiPost('/api/auth/send-code', { email, purpose: 'register', turnstile_token: tsToken });
      if (!ok) {
        // v1.10.2 fix: 仅在失败时重置人机验证（下次重试需重新验证）。
        // 旧实现发码成功后也立刻 reset()，widget 会马上又转一圈"正在验证" → 用户观感就是"刚验证完又弹一次"。
        // token 一次性由后端 siteverify 兜底（重放被 timeout-or-duplicate 拒），成功后无需前端 reset。
        window.__xiyuTurnstileToken = null;
        try { if (window.turnstile) window.turnstile.reset(); } catch {}
        showMsg('msg-register', data.message || '发送失败，请稍后再试', 'error');
        btnSendCode.disabled = false;
        btnSendCode.textContent = '发送验证码';
        return;
      }
      showMsg('msg-register', '验证码已发送至邮箱，5 分钟内有效', 'success');

      // Cooldown 60s
      let left = 60;
      btnSendCode.textContent = left + ' s';
      cooldownTimer = setInterval(() => {
        left--;
        if (left <= 0) {
          clearInterval(cooldownTimer);
          btnSendCode.disabled = false;
          btnSendCode.textContent = '重新发送';
        } else {
          btnSendCode.textContent = left + ' s';
        }
      }, 1000);
    });

    // ─── 注册 ───────────────────────────────────────────────────────────────
    formReg.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-register');
      const original = btn.innerHTML;

      const termsAccepted = formReg.terms_accepted && formReg.terms_accepted.checked;
      if (!termsAccepted) {
        return showMsg('msg-register', '需要勾选同意《用户协议》和《隐私政策》', 'error');
      }

      const body = {
        username: formReg.username.value.trim(),
        email:    formReg.email.value.trim(),
        code:     formReg.code.value.trim(),
        password: formReg.password.value,
        terms_accepted: true,
      };

      setLoading(btn, true, '创建账号');
      const { ok, data } = await apiPost('/api/auth/register', body);
      setLoading(btn, false, original);

      if (!ok) {
        return showMsg('msg-register', data.message || '注册失败', 'error');
      }
      showMsg('msg-register', '注册成功，即将进入...', 'success');
      localStorage.setItem('xiyu_user', JSON.stringify(data.user));
      if (data.token) localStorage.setItem('xiyu_token', data.token);
      setTimeout(() => { location.href = '/app/create.html'; }, 600);
    });

    // ─── Local 模式感知 ─────────────────────────────────────────────────────
    // 根据 /api/setup/status 中的 auth_mode / initialized / single_user 字段
    (async function checkLocalMode() {
      try {
        const r = await fetch('/api/setup/status');
        const d = await r.json();
        if (!d.ok) return;
        const mode        = d.data?.auth_mode;
        const initialized = d.data?.initialized;
        const singleUser  = d.data?.single_user;

        // v1.5.1: SINGLE_USER 模式 — 全自动登录，跳过整个登录页
        if (singleUser) {
          try {
            const resp = await fetch('/api/auth/single-user-login', { method: 'POST' });
            const data = await resp.json();
            if (data.success && data.token) {
              localStorage.setItem('xiyu_user', JSON.stringify(data.user));
              localStorage.setItem('xiyu_token', data.token);
              // 没有 companion 就跳 create.html，否则跳 dashboard.html
              try {
                const meR = await fetch('/api/me/companion', {
                  headers: { Authorization: 'Bearer ' + data.token },
                });
                const meD = await meR.json();
                const hasCompanion = meD?.data?.companion_id;
                location.replace(hasCompanion ? '/app/dashboard.html' : '/app/create.html');
              } catch {
                location.replace('/app/dashboard.html');
              }
              return;
            }
          } catch (e) {
            console.warn('[single-user] auto-login failed, falling back to manual', e);
          }
        }

        if (mode === 'local' && !initialized) {
          // 首次本地初始化 → 直接跳 setup.html，避免让用户对着没用的登录/注册表单发呆
          location.replace('/app/setup.html');
          return;
        } else if (mode === 'local' && initialized) {
          // 本地模式已初始化 → 隐藏"注册"tab，只允许登录
          tabReg.style.display = 'none';
          // 本地模式不需要邮箱：调整账号占位符，并隐藏"忘记密码"（无邮件通道可发重置）
          const accountInput = document.getElementById('input-account');
          if (accountInput) accountInput.placeholder = '用户名';
          const forgotLink = document.getElementById('link-forgot');
          if (forgotLink) forgotLink.style.display = 'none';
          // 同时把卡片标题/副标题降一下"账号"的存在感
          const h1 = document.querySelector('main h1');
          if (h1) h1.textContent = '欢迎回来';
          const sub = h1 && h1.nextElementSibling;
          if (sub) sub.textContent = '用本地账号登录后继续。';
        }
        // AUTH_MODE=email：保持默认行为（邮箱验证码注册可用）
      } catch {}
    })();

    // ─── 登录 ───────────────────────────────────────────────────────────────
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const original = btn.innerHTML;
      const body = {
        account:  formLogin.account.value.trim(),
        password: formLogin.password.value,
      };
      setLoading(btn, true, '登录');
      const { ok, data } = await apiPost('/api/auth/login', body);
      setLoading(btn, false, original);

      if (!ok) {
        return showMsg('msg-login', data.message || '账号或密码错误', 'error');
      }
      showMsg('msg-login', '登录成功，即将进入...', 'success');
      localStorage.setItem('xiyu_user', JSON.stringify(data.user));
      if (data.token) localStorage.setItem('xiyu_token', data.token);
      setTimeout(() => { location.href = '/app/dashboard.html'; }, 500);
    });
  </script>
</body>
</html>
